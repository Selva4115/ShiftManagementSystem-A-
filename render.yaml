services:
  # 1. Flask API Backend Web Service
  - type: web
    name: shiftflow-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt gunicorn psycopg2-binary
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shiftflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # Will prompt you to input this on Render dashboard
      - key: SMTP_PASS
        sync: false  # Will prompt you to input this on Render dashboard

  # 2. Vite React Frontend Static Site
  - type: web
    name: shiftflow-frontend
    runtime: static
    rootDir: app/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 3. Managed PostgreSQL Database (Free Tier)
  - name: shiftflow-db
    plan: free
